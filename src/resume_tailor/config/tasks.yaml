parse_resume_task:
  description: >
    Read the candidate resume text from "{resume_text_path}" using read_text_file.
    The visual layout of the final PDF matches "{template_pdf_path}" (reference only); your job is to
    fill StructuredResumeContent so sections align: full_name, headline, contact_line, linkedin_url,
    professional_summary, experience (list of roles with title, company, date_range, bullets, tech_used),
    technical_skills_frontend, technical_skills_backend, technical_skills_devops, education.
  expected_output: >
    StructuredResumeContent pydantic object.
  agent: resume_parsing_agent
  output_file: output/resume_parsed.json

parse_job_description_task:
  description: >
    Read "{job_description_text_path}" with read_text_file. Produce JobDescriptionStructure.
  expected_output: >
    Structured job description fields.
  agent: job_description_parsing_agent
  output_file: output/job_description_parsed.json

tailor_resume_task:
  description: >
    Using context from resume parsing and JD parsing, produce an updated StructuredResumeContent tailored
    to the job. Keep all facts truthful; rephrase for relevance and keywords. For ATS-friendly content:
    weave concrete JD phrases into achievement bullets (not only the skills lines), prefer ASCII characters
    in visible text, keep bullets clear and dated experience ranges explicit, and avoid decorative symbols
    in bullet text. Note: the pipeline still emits a layout PDF for humans; mention in tailoring_summary
    if the user should also keep a .doc/.docx plain export for employers that require it.
    Refinement context: refinement_round is "{refinement_round}". If refinement_round is not "0", read
    prior_evaluation_feedback below and materially improve the resume so the next evaluation can honestly
    reach at least score_1_to_10 {min_recruiter_score}/10 and ats_readiness_score_0_to_100 {min_ats_score}/100
    without inventing employers, dates, degrees, or tools the candidate did not have. Address gaps and
    suggestions from the prior pass explicitly.
    prior_evaluation_feedback:
    {prior_evaluation_feedback}
    Call write_tailored_resume_files with output_dir "{output_dir}" and tailored_resume_json set to
    the full JSON object (all StructuredResumeContent fields). Use \\n inside strings instead of raw newlines.
  expected_output: >
    Confirmation of paths to tailored_resume.pdf and tailored_resume.txt from the tool.
  agent: tailoring_agent
  context:
    - parse_resume_task
    - parse_job_description_task
  output_file: output/tailoring_summary.md

evaluate_resume_task:
  description: >
    Evaluate output in "{output_dir}". This run is refinement_round "{refinement_round}".
    Pipeline bar: recruiter fit (score_1_to_10) should reach at least {min_recruiter_score}/10 and
    ATS readiness (ats_readiness_score_0_to_100) at least {min_ats_score}/100 when the resume objectively
    meets those bars; score honestly from tools and content—never fabricate tool numbers.
    1) Call get_ats_guidelines (no arguments) and use it as the rubric for ATS commentary.
    2) Call read_tailored_resume_text with "{output_dir}" for the tailored plain text.
    3) Call read_text_file on "{job_description_text_path}" for raw JD text.
    4) Call compute_keyword_similarity with tailored resume text and JD text; put the numeric value in cosine_similarity_note.
    5) Call compute_ats_resume_metrics with the same two texts; summarize key numbers in ats_metrics_interpretation.
    6) Set ats_readiness_score_0_to_100 (0–100) by combining: JD token match rate and cosine similarity from the tools,
    ASCII cleanliness, presence of date-like tokens, reasonable bullet structure, and how well the resume follows
    get_ats_guidelines (keywords in context, simple linear text, etc.). This is a heuristic, not a vendor ATS certification.
    7) Set score_1_to_10 for overall recruiter-style fit (distinct from ATS score).
    8) Fill keyword_alignment, content_alignment, ats_compatibility, suggestions (include ATS tips while
    ats_readiness_score_0_to_100 is below {min_ats_score}), and formatted_report_markdown: a polished report with headings
    "## Executive summary", "## Recruiter fit (1–10)", "## ATS readiness (0–100)", "## Evidence from metrics",
    "## Recommendations", using bullet lists where helpful. Embed both numeric scores in the executive summary and
    state clearly whether each score meets the pipeline minimums ({min_recruiter_score} and {min_ats_score}).
  expected_output: >
    ResumeEvaluation pydantic object with all fields populated, especially formatted_report_markdown and
    ats_readiness_score_0_to_100.
  agent: evaluator_agent
  context:
    - tailor_resume_task
    - parse_job_description_task
  output_file: output/evaluation.md
